version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventoryos_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventoryos_secret}
      POSTGRES_DB: ${POSTGRES_DB:-inventoryos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventoryos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventoryos_net

  redis:
    image: redis:7-alpine
    container_name: inventoryos_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventoryos_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventoryos_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-inventoryos}:${POSTGRES_PASSWORD:-inventoryos_secret}@postgres:5432/${POSTGRES_DB:-inventoryos}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecret-change-in-production-min-32-chars}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - inventoryos_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventoryos_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - inventoryos_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventoryos_celery
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-inventoryos}:${POSTGRES_PASSWORD:-inventoryos_secret}@postgres:5432/${POSTGRES_DB:-inventoryos}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecret-change-in-production-min-32-chars}
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    depends_on:
      - postgres
      - redis
    networks:
      - inventoryos_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventoryos_celery_beat
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-inventoryos}:${POSTGRES_PASSWORD:-inventoryos_secret}@postgres:5432/${POSTGRES_DB:-inventoryos}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    command: celery -A app.worker beat --loglevel=info
    depends_on:
      - postgres
      - redis
    networks:
      - inventoryos_net

volumes:
  postgres_data:
  redis_data:

networks:
  inventoryos_net:
    driver: bridge
