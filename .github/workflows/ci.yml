name: InventoryOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inventoryos
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: inventoryos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run algorithm unit tests (pure Python, no DB)
        run: |
          cd backend
          pytest tests/test_algorithms.py -v --tb=short --no-header

      - name: Run full test suite
        env:
          DATABASE_URL: postgresql+asyncpg://inventoryos:testpass@localhost:5432/inventoryos_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-must-be-at-least-32-chars-long
        run: |
          cd backend
          pytest tests/ -v --tb=short --no-header --cov=app --cov-report=xml

      - name: Lint (ruff)
        run: cd backend && ruff check app/ --select=E,F --ignore=E501

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Lint
        run: cd frontend && npx next lint --dir src || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t inventoryos-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t inventoryos-frontend:ci
